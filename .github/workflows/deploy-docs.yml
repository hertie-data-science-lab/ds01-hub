name: Deploy Docs to GitHub Pages

# Builds the Docusaurus end-user site under website/ and deploys it into the org
# Pages repo at /ds01/. Content in docs/ is synced from ds01-infra/docs-user by
# the sync-docs-to-hub workflow; a sync push (or a website/ change) triggers a
# rebuild + deploy. PRs run build-only as a correctness gate.
#
# Production URL: https://hertie-data-science-lab.github.io/ds01/

on:
  pull_request:
    branches: [main]
    paths:
      - 'website/**'
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ds01-hub
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build site
        working-directory: website
        run: npm run build

      - name: Upload build artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: website/build
          retention-days: 1

  deploy:
    name: Deploy to org Pages site (/ds01/)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: site

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: hertie-data-science-lab/hertie-data-science-lab.github.io
          token: ${{ secrets.DSL_MAIN_SITE_DEPLOY_KEY }}
          path: target-repo

      - name: Deploy to target repo
        run: |
          # Replace the ds01/ subtree with the freshly built site.
          rm -rf target-repo/ds01
          cp -r site target-repo/ds01
          # Disable Jekyll on the org Pages repo so Docusaurus assets/ are served as-is.
          touch target-repo/.nojekyll
          cd target-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ds01 .nojekyll
          git diff --staged --quiet || git commit -m "docs: update DS01 user site

          Auto-deployed from ds01-hub@${{ github.sha }}"
          git push
